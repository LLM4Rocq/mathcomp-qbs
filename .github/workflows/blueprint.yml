name: Deploy Blueprint

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: coq-community/docker-coq-action@v1
        with:
          opam_file: coq-qbs.opam
          coq_version: '9.0.1'
          ocaml_version: 'default'
          before_script: |
            startGroup "Workaround permission issue"
              sudo chown -R 1000:1000 .
            endGroup
          after_script: |
            startGroup "Build docs"
              if ! command -v rocq >/dev/null 2>&1 ; then
                coq_makefile -f _CoqProject -o Makefile.doc
              else
                rocq makefile -f _CoqProject -o Makefile.doc
              fi
              make -f Makefile.doc html
            endGroup
            sudo chown -R $(id -u):$(id -g) html/

      - name: Revert permissions
        if: ${{ always() }}
        run: sudo chown -R 1001:116 .

      - name: Upload coqdoc artifact
        uses: actions/upload-artifact@v4
        with:
          name: coqdoc-html
          path: html/

  build-blueprint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz libgraphviz-dev texlive-latex-base

      - name: Install rocqblueprint
        run: |
          pip install rocqblueprint

      - name: Build blueprint
        run: |
          rocqblueprint web

      - name: Upload blueprint artifact
        uses: actions/upload-artifact@v4
        with:
          name: blueprint-web
          path: blueprint/web/

  combine-and-deploy:
    needs: [build-docs, build-blueprint]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download blueprint
        uses: actions/download-artifact@v4
        with:
          name: blueprint-web
          path: site/

      - name: Download coqdoc
        uses: actions/download-artifact@v4
        with:
          name: coqdoc-html
          path: site/docs/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
